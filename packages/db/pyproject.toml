[project]
name = "oute-muscle-db"
version = "0.1.0"
description = "Oute Muscle database models and migrations (SQLAlchemy + Alembic)"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pgvector>=0.4.2",
    "oute-muscle-core",
]

[tool.uv.sources]
oute-muscle-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
