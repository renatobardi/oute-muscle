# Deploy workflow — Trunk-Based CD
# Triggered on every push to main (after CI passes).
#
# Pipeline:
#   1. Authenticate to GCP via Workload Identity Federation
#   2. Build Docker image and push to Artifact Registry
#   3. Run database migrations (alembic upgrade head)
#   4. Deploy to Cloud Run prod (zero-downtime rolling update)
#   5. Readiness probe — fail the pipeline if /health/live doesn't return 200

name: Deploy

on:
  push:
    branches: [main]

  # Allow manual re-deploy (e.g. rollback trigger)
  workflow_dispatch:

permissions:
  id-token: write   # required for Workload Identity Federation
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build and push Docker image
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: image
        env:
          REGISTRY: ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/muscle-prod-docker
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/muscle-api:${TAG::8}"
          docker buildx build \
            --file apps/api/Dockerfile \
            --tag "$IMAGE" \
            --tag "$REGISTRY/muscle-api:latest" \
            --cache-from type=registry,ref="$REGISTRY/muscle-api:buildcache" \
            --cache-to   type=registry,ref="$REGISTRY/muscle-api:buildcache",mode=max \
            --push \
            .
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────
  # Database migrations
  # ─────────────────────────────────────────────────────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Set up Cloud SQL Auth Proxy
        run: |
          curl -sSL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64 -o cloud-sql-proxy
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy "${{ vars.CLOUD_SQL_INSTANCE }}" --port 5432 > /tmp/proxy.log 2>&1 &
          PROXY_PID=$!
          for i in $(seq 1 15); do
            if ! kill -0 $PROXY_PID 2>/dev/null; then
              echo "Cloud SQL Proxy crashed. Logs:"
              cat /tmp/proxy.log
              exit 1
            fi
            if pg_isready -h 127.0.0.1 -p 5432 2>/dev/null; then
              echo "Cloud SQL Proxy ready"
              exit 0
            fi
            echo "Waiting for proxy... attempt $i"
            sleep 2
          done
          echo "Cloud SQL Proxy did not become ready. Logs:"
          cat /tmp/proxy.log
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install migration deps
        run: pip install alembic asyncpg sqlalchemy pgvector python-dotenv

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ vars.DB_NAME }}
        run: |
          cd packages/db
          alembic upgrade head

  # ─────────────────────────────────────────────────────────────
  # Deploy to Cloud Run (prod)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service:    muscle-prod-api
          image:      ${{ needs.build.outputs.image }}
          region:     ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}
          flags: >-
            --memory 1Gi
            --cpu 1
            --min-instances 0
            --max-instances 10
            --cpu-boost
            --allow-unauthenticated
            --set-env-vars PYTHONUNBUFFERED=1

      - name: Verify deployment (readiness probe)
        run: |
          SERVICE_URL=$(gcloud run services describe \
            muscle-prod-api \
            --region=${{ vars.REGION }} \
            --project=${{ vars.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          # Poll /health/live for up to 60s
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health/live")
            if [[ "$STATUS" == "200" ]]; then
              echo "✓ Service healthy"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — waiting 5s..."
            sleep 5
          done
          echo "✗ Service did not become healthy in 60s"
          exit 1

  # ─────────────────────────────────────────────────────────────
  # Build, push, and deploy Web frontend
  # ─────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: image
        env:
          REGISTRY: ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/muscle-prod-docker
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/muscle-web:${TAG::8}"
          docker buildx build \
            --file apps/web/Dockerfile \
            --tag "$IMAGE" \
            --tag "$REGISTRY/muscle-web:latest" \
            --cache-from type=registry,ref="$REGISTRY/muscle-web:buildcache" \
            --cache-to   type=registry,ref="$REGISTRY/muscle-web:buildcache",mode=max \
            --push \
            .
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service:    muscle-prod-web
          image:      ${{ steps.image.outputs.image }}
          region:     ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}
          flags: >-
            --memory 512Mi
            --cpu 1
            --min-instances 0
            --max-instances 5
            --port 3000
            --allow-unauthenticated
            --set-env-vars NODE_ENV=production,HOST=0.0.0.0

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe \
            muscle-prod-web \
            --region=${{ vars.REGION }} \
            --project=${{ vars.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
            if [[ "$STATUS" == "200" ]]; then
              echo "✓ Web service healthy (/health responds 200)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — waiting 5s..."
            sleep 5
          done
          echo "✗ Web service did not become healthy in 60s"
          exit 1
