# T180: Deploy workflow
# Triggered on push to main (→ staging) or a version tag (→ prod).
#
# Pipeline:
#   1. Authenticate to GCP via Workload Identity Federation
#   2. Build Docker image and push to Artifact Registry
#   3. Run database migrations (alembic upgrade head)
#   4. Deploy to Cloud Run (zero-downtime rolling update)

name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

  # Allow manual deploys to any environment
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (staging | prod)"
        required: true
        default: staging
        type: choice
        options: [staging, prod]

permissions:
  id-token: write   # required for Workload Identity Federation
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Determine target environment
  # ─────────────────────────────────────────────────────────────
  setup:
    name: Determine environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag:   ${{ steps.env.outputs.image_tag }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="prod"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────
  # Build and push Docker image
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: image
        env:
          REGISTRY: ${{ vars.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ needs.setup.outputs.environment == 'prod' && 'oute-prod-docker' || 'oute-staging-docker' }}
          TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          IMAGE="$REGISTRY/oute-api:$TAG"
          docker buildx build \
            --file apps/api/Dockerfile \
            --tag "$IMAGE" \
            --tag "$REGISTRY/oute-api:latest" \
            --cache-from type=registry,ref="$REGISTRY/oute-api:buildcache" \
            --cache-to   type=registry,ref="$REGISTRY/oute-api:buildcache",mode=max \
            --push \
            .
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────
  # Database migrations
  # ─────────────────────────────────────────────────────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Set up Cloud SQL Auth Proxy
        uses: google-github-actions/setup-cloud-sql-proxy@v1
        with:
          instances: ${{ vars.CLOUD_SQL_INSTANCE }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install migration deps
        run: |
          pip install alembic asyncpg sqlalchemy python-dotenv

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ vars.DB_NAME }}
        run: |
          cd packages/db
          alembic upgrade head

  # ─────────────────────────────────────────────────────────────
  # Deploy to Cloud Run
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [setup, build, migrate]
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_ACTIONS_SA }}

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service:    oute-${{ needs.setup.outputs.environment }}-api
          image:      ${{ needs.build.outputs.image }}
          region:     ${{ vars.REGION }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Verify deployment (readiness probe)
        run: |
          SERVICE_URL=$(gcloud run services describe \
            oute-${{ needs.setup.outputs.environment }}-api \
            --region=${{ vars.REGION }} \
            --project=${{ vars.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          # Poll /health/ready for up to 60s
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health/ready")
            if [[ "$STATUS" == "200" ]]; then
              echo "✓ Service healthy"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — waiting 5s..."
            sleep 5
          done
          echo "✗ Service did not become healthy in 60s"
          exit 1
