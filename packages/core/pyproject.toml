[project]
name = "oute-muscle-core"
version = "0.1.0"
description = "Oute Muscle shared domain logic — framework-agnostic, no GCP deps"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
